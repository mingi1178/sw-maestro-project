services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SOLAR_API_KEY=${SOLAR_API_KEY}
      - HWPX_MCP_URL=${HWPX_MCP_URL:-http://hwpx-mcp:3001}
    volumes:
      - sessions:/tmp/sessions
    depends_on:
      hwpx-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  hwpx-mcp:
    build:
      context: ./hwpx-mcp
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - sessions:/tmp/sessions
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  sessions:
