services:
  backend:
    # uvicorn --reload picks up edits in the mounted source tree.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - ./.chroma:/app/.chroma
      - ./.materials:/app/.materials
    # Local dev — bind to all interfaces so Windows host browsers can hit it.
    ports:
      - "8000:8000"

  frontend:
    command: npm run dev
    volumes:
      - ./frontend:/app
      # Anonymous volume protects container's node_modules from being shadowed
      # by the host bind mount (host typically has Linux-incompatible binaries
      # if installed from Windows / macOS).
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
