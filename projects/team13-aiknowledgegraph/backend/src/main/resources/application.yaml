spring:
  application:
    name: AI13-BE

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/ai13}
    username: ${DB_USERNAME:ai13}
    password: ${DB_PASSWORD:ai13}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

solar:
  api:
    api-key: ${UPSTAGE_API_KEY}
    model: solar-pro3
